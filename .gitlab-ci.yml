stages:
  - security_and_lint
  - test
  - build_and_scan
  - deploy
  - notify

variables:
  AWS_DEFAULT_REGION: us-east-1
  ECR_REGISTRY: 089659004332.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: api-backend-prod
  AWS_ROLE_ARN: arn:aws:iam::089659004332:role/gitlab-ci-deploy-role

default:
  tags:
    - lab-vps-runner

bandit_sast:
  stage: security_and_lint
  image: python:3.11-slim
  script:
    - pip install bandit
    - bandit -r app/ -ll

trufflehog_scan:
  stage: security_and_lint
  image: 
    name: trufflesecurity/trufflehog:latest
    entrypoint: [""]
  script:
    - trufflehog filesystem . --no-update --fail

checkov_iac_scan:
  stage: security_and_lint
  image: python:3.11-slim
  script:
    - pip install "numpy<2" checkov
    - checkov -d k8s/ --soft-fail
    - checkov -d terraform/ --soft-fail

pytest:
  stage: test
  image: python:3.11-slim
  script:
    - cd app/
    - pip install -r requirements.txt pytest httpx
    - pytest test_main.py

build_scan_push:
  stage: build_and_scan
  image: docker:24.0.5
  script:
    - apk add --no-cache curl
    
    # Image Build (Local for LAB)
    - docker build -t local-api-backend:$CI_COMMIT_SHA app/
    
    # Security Scan using Trivy
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - trivy image --exit-code 0 --severity HIGH,CRITICAL local-api-backend:$CI_COMMIT_SHA
    
